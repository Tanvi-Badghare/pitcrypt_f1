name: PitCrypt-F1 Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic test fixture data
        run: |
          mkdir -p data/raw data/processed
          python -c "
          import pandas as pd
          import numpy as np
          import json

          for team in ['mercedes', 'redbull']:
              n = 200
              df = pd.DataFrame({
                  'Speed':     np.random.uniform(50, 300, n),
                  'RPM':       np.random.uniform(8000, 14000, n),
                  'Throttle':  np.random.uniform(0, 100, n),
                  'Brake':     np.random.randint(0, 2, n),
                  'nGear':     np.random.randint(1, 8, n),
                  'DRS':       np.random.choice([0, 8, 10, 12, 14], n),
                  'Driver':    'RUS',
                  'LapNumber': np.random.randint(1, 50, n),
                  'Team':      team,
                  'Race':      'Bahrain',
                  'Session':   'R',
              })
              df.to_csv(f'data/raw/{team}_Bahrain_R.csv', index=False)

          thresholds = {}
          for team in ['mercedes', 'redbull', 'combined']:
              thresholds[team] = {
                  'Speed':    {'lower': -5.0, 'upper': 400.0},
                  'RPM':      {'lower': 0.0,  'upper': 16000.0},
                  'Throttle': {'lower': 0.0,  'upper': 100.0},
                  'Brake':    {'lower': 0.0,  'upper': 1.0},
                  'nGear':    {'lower': 0.0,  'upper': 8.0},
                  'DRS':      {'lower': 0.0,  'upper': 14.0},
              }
          with open('data/processed/thresholds.json', 'w') as f:
              json.dump(thresholds, f, indent=2)

          print('Synthetic test fixtures created.')
          "

      - name: Run car-producer tests
        run: pytest car-producer/tests/ -v

      - name: Run relay-node tests
        run: pytest relay-node/tests/ -v

      - name: Run validator-node tests
        run: pytest validator-node/tests/ -v

      - name: Run IAM tests
        run: pytest iam-module/tests/ -v

      - name: Run full pipeline self-test
        run: python validator-node/src/main.py

      - name: Run tampering simulation
        run: python simulations/tampering_sim.py

      - name: Run IAM breach simulation
        run: python simulations/iam_breach_sim.py